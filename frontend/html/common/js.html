        function shouldSkipNode(node) {
            const parent = node.parentNode;
            if (!parent) {
                return false;
            }

            const tag = parent.nodeName;
            if (tag === "SCRIPT" || tag === "STYLE" || tag === "TEXTAREA" || tag === "INPUT") {
                return true;
            }

            // Skip any rich-text / code editors and contenteditable areas
            if (
                parent.closest &&
                parent.closest(
                    "input, textarea, [contenteditable], .CodeMirror, .cm-editor, .EasyMDEContainer, .editor, .ProseMirror"
                )
            ) {
                return true;
            }

            return false;
        }

        function transformTextNode(node) {
            if (shouldSkipNode(node)) {
                return;
            }
            let text = node.nodeValue;
            let replaced = false;

            for (const [from, to] of Object.entries(REPLACE_RULES)) {
                if (text.includes(from)) {
                    text = text.split(from).join(to);
                    replaced = true;
                }
            }

            if (replaced) {
                node.nodeValue = text;
            }
        }

        function walkAndReplace(root) {
            const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null, false);

            let node;
            while ((node = walker.nextNode())) {
                transformTextNode(node);
            }
        }

        function run() {
            try {
                walkAndReplace(document.body);
            } catch (e) {
                // swallow errors to avoid breaking the page
            }
        }

        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", run);
        } else {
            run();
        }
    })();
